<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Arcade Tournament Board</h1>
        <p>Browse upcoming arcade torunaments nad view player registratipon.</p>

        <!--action buttons-->
        <button id="load-btn" class="btn btn-primary me-2">Load Tournaments</button>
        <button id="clear-btn" class="btn btn-secondary">Clear</button>
        <!--Zone de status-->
        <div id="status-area" class="mt-3"></div>

        <!--zone cards tournaments-->

        <div class="mt-4">
            <h2>Torunaments</h2>
            <div id="tournaments-container" class="row">
                <p class="text-muted">No tournaments loaded yet. Click "Load Tournaments" to begin.</p>
            </div>
        </div>

        <div id="registrations-section" class="mt-5">
            <h2>Registrations</h2>
            <p class="text-muted">Select a tournament to view its registrations.</p>
        </div>
    </div>
   
    <script type="module" src="app.js"></script>
</body>
</html>

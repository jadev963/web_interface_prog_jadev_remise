<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World cup Board</title>
</head>
<body>
    <main>
        <h1>World cup Board</h1>
        <p>Track teams standings, points, and goals difference for the 2026 World Cup</p>
        <p id="status">Click the button to load teams</p>
        
        <button id="load Teams">Load Teams</button>
        <button id="clear-btn">Clear</button>

        <section>
            <h2>Teams</h2>
            <div id="teams-container"></div>
        </section>

        <section>
            <h2>Selected Team</h2>
            <div id="details-container">
                <p>No team selected yet</p>
            </div>
        </section>
    </main>
</body>
</html>
